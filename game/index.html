<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chase Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud">
    <div id="info">Survive as long as you can. Use arrow keys or WASD.</div>
    <div id="scoreboard">
      <div id="score">Score: 0</div>
      <div id="distance">Distance: 0</div>
      <div id="highscore">High: 0</div>
    </div>
    <div id="status"></div>
  </div>
  <script src="game.js"></script>
</body>
</html>
